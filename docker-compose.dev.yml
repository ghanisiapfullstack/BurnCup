services:
  backend:
    build:
      context: ./burncup-be
      dockerfile: Dockerfile.dev
    volumes:
      - ./burncup-be:/app
    ports:
      - "8080:8080"
    command: ["air"]
    depends_on:
      - frontend
      - postgres   # Add postgres as a dependency

  frontend:
    build:
      context: ./burncup-fe
      dockerfile: Dockerfile.dev
    volumes:
      - ./burncup-fe:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    labels:
      - "com.microsoft.devcontainer.name=frontend"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: burncup_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: