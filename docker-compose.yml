version: '3.8'

services:
  backend:
    build: ./burncup-be
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - postgres

  frontend:
    build: ./burncup-fe
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: burncup_prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: